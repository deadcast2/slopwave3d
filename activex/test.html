<html>
<head>
    <title>slop3d</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #1a1a2e;
            text-align: center;
        }
        #game-container {
            width: 640px;
            margin: 0 auto;
            top: 50%;
            position: relative;
            margin-top: -250px;
        }
        #stats {
            color: #0f0;
            font: 12px monospace;
            text-align: left;
            padding: 4px 0;
        }
    </style>
</head>
<body>

<div id="game-container">
<object id="slop3d"
        classid="clsid:A1B2C3D4-E5F6-4A7B-8C9D-0E1F2A3B4C5D"
        width="640" height="480">
    <p style="color: red;">ActiveX control failed to load. Make sure slop3d.dll is registered.</p>
</object>
<div id="stats">
    <span id="fps">FPS: --</span> &nbsp; <span id="frametime">Frame: -- ms</span>
</div>
</div>

<script language="JScript">
var t = 0;
var engine = document.getElementById('slop3d');
var fpsEl = document.getElementById('fps');
var ftEl = document.getElementById('frametime');
var lastTime = new Date().getTime();
var frameCount = 0;
var fpsAccum = 0;

engine.Init();

/* Resolve asset paths relative to this HTML file's directory. */
var path = unescape(document.URL);
if (path.substring(0, 8) == "file:///") path = path.substring(8);
else if (path.substring(0, 7) == "file://") path = path.substring(7);
path = path.replace(/\//g, '\\');
var baseDir = path.substring(0, path.lastIndexOf('\\') + 1);

var texPath = baseDir + "crate.jpg";
var objPath = baseDir + "cube.obj";
var textureId = engine.LoadTexture(texPath);
var meshId = engine.LoadOBJ(objPath);

engine.OnUpdate = function() {
    var now = new Date().getTime();
    var dt = now - lastTime;
    lastTime = now;

    frameCount++;
    fpsAccum += dt;
    if (fpsAccum >= 500) {
        var fps = (frameCount / fpsAccum) * 1000;
        var ft = fpsAccum / frameCount;
        frameCount = 0;
        fpsAccum = 0;
        fpsEl.innerText = 'FPS: ' + fps.toFixed(1);
        ftEl.innerText = 'Frame: ' + ft.toFixed(2) + ' ms';
    }

    t += 0.02;
    var camX = Math.sin(t) * 3;
    var camZ = Math.cos(t) * 3;
    engine.SetCamera(camX, 1.5, camZ, 0, 0, 0, 0, 1, 0);

    engine.DrawMesh(meshId, textureId);
};

engine.Start();
</script>

</body>
</html>
