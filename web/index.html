<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>slop3d</title>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            width: 640px;
        }
        #game-canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            width: 640px;
            height: 480px;
        }
        #stats {
            color: #0f0;
            font: 12px monospace;
            padding: 4px 0;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="stats">
            <span id="fps">FPS: --</span> &nbsp; <span id="frametime">Frame: -- ms</span>
        </div>
    </div>
    <script src="slop3d_wasm.js"></script>
    <script src="../js/slop3d.js"></script>
    <script>
        (async function () {
            const engine = new Slop3D('game-canvas');
            await engine.init();

            const textureId = await engine.loadTexture('assets/crate.jpg');
            const meshId = await engine.loadOBJ('assets/cube.obj');

            let t = 0;
            engine.onUpdate(() => {
                t += 0.02;
                const camX = Math.sin(t) * 3;
                const camZ = Math.cos(t) * 3;
                engine.setCamera({ x: camX, y: 1.5, z: camZ }, { x: 0, y: 0, z: 0 });

                engine.drawMesh(meshId, textureId);
            });

            engine.start();
        })();
    </script>
</body>
</html>
