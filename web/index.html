<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>slop3d</title>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            width: 640px;
        }
        #game-canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            width: 640px;
            height: 480px;
        }
        #stats {
            color: #0f0;
            font: 12px monospace;
            padding: 4px 0;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="stats">
            <span id="fps">FPS: --</span> &nbsp; <span id="frametime">Frame: -- ms</span>
        </div>
    </div>
    <script src="slop3d_wasm.js"></script>
    <script src="../js/slop3d.js"></script>
    <script>
        (async function () {
            const engine = new Slop3D('game-canvas');
            await engine.init();

            const textureId = await engine.loadTexture('assets/crate.jpg');
            const meshId = await engine.loadOBJ('assets/cube.obj');

            const obj1 = engine.createObject(meshId, textureId);

            const obj2 = engine.createObject(meshId, textureId);
            engine.setObjectPosition(obj2, 2.5, 0, 0);
            engine.setObjectScale(obj2, 0.6, 0.6, 0.6);
            engine.setObjectColor(obj2, 0.5, 0.8, 1.0);

            const obj3 = engine.createObject(meshId, textureId);
            engine.setObjectPosition(obj3, -1.5, 0, 1);
            engine.setObjectAlpha(obj3, 0.5);
            engine.setObjectColor(obj3, 1.0, 0.5, 0.5);

            let t = 0;
            engine.onUpdate(() => {
                t += 0.02;
                const camX = Math.sin(t) * 5;
                const camZ = Math.cos(t) * 5;
                engine.setCamera({ x: camX, y: 1.5, z: camZ }, { x: 0, y: 0, z: 0 });

                engine.setObjectRotation(obj1, 0, t * 30, 0);
                engine.setObjectRotation(obj2, t * 20, 0, t * 40);
                engine.setObjectRotation(obj3, 0, -t * 15, 0);

                engine.renderScene();
            });

            engine.start();
        })();
    </script>
</body>
</html>
