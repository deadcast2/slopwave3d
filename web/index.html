<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>slop3d</title>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            width: 640px;
        }
        #game-canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            width: 640px;
            height: 480px;
        }
        #stats {
            color: #0f0;
            font: 12px monospace;
            padding: 4px 0;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="stats">
            <span id="fps">FPS: --</span> &nbsp; <span id="frametime">Frame: -- ms</span>
        </div>
    </div>
    <script src="slop3d_wasm.js"></script>
    <script src="../js/slop3d.js"></script>
    <script type="text/slopscript" data-canvas="game-canvas">
assets
    model cube = cube.obj
    skin crate = crate.jpg

scene main
    cam = camera: fps, 0, 1.5, 5
    fill = ambient: 0.3, 0.3, 0.3
    sun = directional: 1.0, 0.9, 0.8, -1, -1, -1
    glow = point: 0.3, 0.6, 1.0, 3, 1, 0, 10

    box1 = spawn: cube, crate

    box2 = spawn: cube, crate
    box2.position = 2.5, 0, 0
    box2.scale = 0.6, 0.6, 0.6
    box2.color = 0.5, 0.8, 1.0

    box3 = spawn: cube, crate
    box3.position = -1.5, 0, 1
    box3.alpha = 0.5
    box3.color = 1.0, 0.5, 0.5

    update
        box1.rotation.y = t * 18
        box2.rotation = t * 12, 0, t * 24
        box3.rotation.y = t * -9
        glow.position = sin[t * 45] * 3, 1, cos[t * 45] * 3
    </script>
</body>
</html>
