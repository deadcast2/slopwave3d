name: Update token count

on:
  push:
    branches: [main]
    paths: ['src/**', 'js/**', 'web/**', 'Makefile']

permissions:
  contents: write

jobs:
  update-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: qwibitai/nanoclaw/repo-tokens@main
        id: tokens
        with:
          include: 'src/**/*.c src/**/*.h js/**/*.js web/**/*.js web/**/*.html Makefile'
          context-window: 200000
          badge-path: '.github/badges/tokens.svg'
      - name: Commit if changed
        run: |
          git add README.md .github/badges/tokens.svg
          git diff --cached --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: update token count to ${{ steps.tokens.outputs.badge }}"
          git push
